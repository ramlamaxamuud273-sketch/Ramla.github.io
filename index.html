<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramla Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f1eb;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #ddd;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
        }
        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }
        .nav-buttons a {
            background-color: #666;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <img class="profile-img" src="sawir.jpg" alt="Ramla">
        
        <h1>Hello! I'm Ramla</h1>
        <p>Welcome to my official portfolio website. I am passionate about technology, design, and building creative web experiences. Feel free to explore my journey and projects below.</p>
        
        <div class="nav-buttons">
            <a href="#">Resume</a>
            <a href="#">My Journey</a>
            <a href="#">Projects</a>
            <a href="#">Contact</a>
        </div>
    </div>

</body>
</html>
