<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramla Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f1eb;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 4px solid #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            margin: 10px 0;
            font-size: 2.5rem;
        }
        p {
            font-size: 1.2rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="profile-img" src="IMG-20260529-WA0024.jpg" alt="Ramla Portfolio">
        <h1>Ramla.github.io</h1>
        <p>My personal portfolio website built with GitHub Pages.</p>
    </div>
</body>
